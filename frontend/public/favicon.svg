<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#E8E0D4"/>
  <!-- Gridbert's glasses -->
  <circle cx="9" cy="13" r="5.5" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <circle cx="23" cy="13" r="5.5" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <line x1="14.5" y1="11.5" x2="17.5" y2="11.5" stroke="#2C2C2C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3.5" y1="12" x2="1" y2="11" stroke="#2C2C2C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28.5" y1="12" x2="31" y2="11" stroke="#2C2C2C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="9" cy="13" r="2" fill="#2C2C2C"/>
  <circle cx="23" cy="13" r="2" fill="#2C2C2C"/>
  <circle cx="9.7" cy="12.2" r="0.6" fill="#F5F1EB"/>
  <circle cx="23.7" cy="12.2" r="0.6" fill="#F5F1EB"/>
  <!-- Mouth (friendly smile) -->
  <path d="M12,20 Q16,23.5 20,20" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Bow-tie -->
  <path d="M12,24 L15,26 L12,28 Z" fill="#C4654A" stroke="#2C2C2C" stroke-width="0.6" stroke-linejoin="round"/>
  <path d="M20,24 L17,26 L20,28 Z" fill="#C4654A" stroke="#2C2C2C" stroke-width="0.6" stroke-linejoin="round"/>
  <circle cx="16" cy="26" r="1" fill="#2C2C2C"/>
</svg>
